<div>
  <select
    [(ngModel)]="selectedCategory"
    (ngModelChange)="onCategoryChange()"
  >
    <option
      [ngValue]="null">
      {{ placeholder }}
    </option>

    <option
      *ngFor="let category of categories"
      [ngValue]="category.id">
      {{ category.name }}
    </option>
  </select>
</div>

<app-add-category-modal
  [isVisible]="showAddModal"
  [type]="type"
  [isInModal]="isInModal"
  (categoryAdded)="onAddCategory($event)"
  (closeModal)="onModalClose()">
</app-add-category-modal>
